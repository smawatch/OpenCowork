<section class="card">
  <div class="eyebrow">OpenCowork Extension</div>
  <h1 id="title">Demo Extension</h1>
  <p id="subtitle"></p>
  <dl id="rows"></dl>
</section>

<style>
  body {
    color: #e5e7eb;
  }

  .card {
    margin: 0;
    padding: 14px;
    border: 1px solid rgba(148, 163, 184, 0.35);
    border-radius: 8px;
    background: rgba(15, 23, 42, 0.72);
  }

  .eyebrow {
    color: #93c5fd;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  h1 {
    margin: 4px 0;
    font-size: 16px;
  }

  p {
    margin: 0 0 10px;
    color: #cbd5e1;
    font-size: 12px;
  }

  dl {
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 6px 12px;
    margin: 0;
    font-size: 12px;
  }

  dt {
    color: #94a3b8;
  }

  dd {
    margin: 0;
    color: #f8fafc;
  }
</style>

<script>
  window.addEventListener('extension-props', (event) => {
    const props = event.detail || {}
    document.getElementById('title').textContent = props.title || 'Demo Extension'
    document.getElementById('subtitle').textContent = props.subtitle || ''

    const rows = Array.isArray(props.rows) ? props.rows : []
    document.getElementById('rows').innerHTML = rows
      .map((row) => `<dt>${escapeHtml(row.label)}</dt><dd>${escapeHtml(row.value)}</dd>`)
      .join('')
  })

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;')
  }
</script>
