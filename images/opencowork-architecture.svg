<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1020" viewBox="0 0 1600 1020" role="img" aria-labelledby="title desc">
  <title id="title">OpenCowork 架构图</title>
  <desc id="desc">OpenCowork 的 Electron 四层架构：渲染进程、Preload、安全桥接、主进程、外部系统与共享契约。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="rendererGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="preloadGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="mainGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="extGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; fill: #334155; }
      .section { font: 700 20px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .boxTitle { font: 700 17px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .boxText { font: 500 13px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; fill: #334155; }
      .small { font: 500 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; fill: #475569; }
      .pill { font: 600 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .label { font: 700 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; fill: #1e293b; }
      .arrow { stroke: #475569; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
      .arrowThin { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); stroke-dasharray: 8 6; }
      .card { rx: 18; ry: 18; filter: url(#shadow); }
      .micro { rx: 12; ry: 12; }
      .divider { stroke: #cbd5e1; stroke-width: 1.5; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1020" fill="url(#bg)"/>

  <text x="64" y="56" class="title">OpenCowork 架构设计图</text>
  <text x="64" y="84" class="subtitle">Electron 4 层架构：Renderer 负责交互与 Agent 循环，Preload 负责最小安全桥接，Main 负责所有特权能力与持久化。</text>

  <!-- Shared contracts band -->
  <rect x="64" y="108" width="1472" height="74" class="card" fill="#ffffff" opacity="0.96"/>
  <text x="88" y="138" class="section">共享契约层</text>
  <text x="88" y="162" class="small">src/shared/*：Agent loop protocol、team runtime types、IPC 消息、浏览器/扩展/同步协议、消息块和 token usage 结构</text>
  <rect x="1010" y="126" width="164" height="30" class="micro" fill="#e2e8f0"/>
  <text x="1092" y="145" text-anchor="middle" class="pill">类型安全边界</text>
  <rect x="1190" y="126" width="158" height="30" class="micro" fill="#e2e8f0"/>
  <text x="1269" y="145" text-anchor="middle" class="pill">跨进程 DTO</text>
  <rect x="1364" y="126" width="148" height="30" class="micro" fill="#e2e8f0"/>
  <text x="1438" y="145" text-anchor="middle" class="pill">协议稳定</text>

  <!-- Main architecture lanes -->
  <rect x="64" y="208" width="468" height="530" class="card" fill="url(#rendererGrad)"/>
  <rect x="566" y="208" width="170" height="530" class="card" fill="url(#preloadGrad)"/>
  <rect x="770" y="208" width="766" height="530" class="card" fill="url(#mainGrad)"/>

  <text x="88" y="242" class="section">渲染进程</text>
  <text x="88" y="268" class="small">src/renderer/src/App.tsx + stores + components + lib</text>

  <text x="590" y="242" class="section">Preload</text>
  <text x="590" y="268" class="small">contextBridge / ipcRenderer</text>

  <text x="794" y="242" class="section">主进程</text>
  <text x="794" y="268" class="small">src/main/index.ts 负责注册、调度与系统能力</text>

  <!-- Renderer boxes -->
  <rect x="88" y="296" width="408" height="106" class="card" fill="#eff6ff"/>
  <text x="110" y="322" class="boxTitle">UI 入口与状态编排</text>
  <text x="110" y="345" class="boxText">
    <tspan x="110" dy="0">• App.tsx 组合 Layout / Onboarding / SSH / DetachedSession</tspan>
    <tspan x="110" dy="20">• Zustand stores 管理会话、任务、目标、MCP、SSH、主题</tspan>
    <tspan x="110" dy="20">• i18n、主题同步、错误边界、通知窗体统一挂载</tspan>
  </text>

  <rect x="88" y="420" width="408" height="118" class="card" fill="#dbeafe"/>
  <text x="110" y="446" class="boxTitle">Agent 循环与工具注册</text>
  <text x="110" y="469" class="boxText">
    <tspan x="110" dy="0">• registerAllTools()：FS / Search / Bash / Plan / Cron / Goal / Memory</tspan>
    <tspan x="110" dy="20">• 动态装载 Skills / SubAgents / Wiki / WebSearch / Code-compatible tools</tspan>
    <tspan x="110" dy="20">• 运行时在渲染侧维护消息流、工具调用状态和流式输出</tspan>
  </text>

  <rect x="88" y="556" width="408" height="134" class="card" fill="#bfdbfe"/>
  <text x="110" y="582" class="boxTitle">渲染侧 Agent 运行时适配</text>
  <text x="110" y="605" class="boxText">
    <tspan x="110" dy="0">• tool-registry / session-runtime-router / stream-event-adapter</tspan>
    <tspan x="110" dy="20">• 处理 foreground / background session、context compression、队列批处理</tspan>
    <tspan x="110" dy="20">• 通过 IPC 把特权操作委派给主进程，保持 UI 层非特权</tspan>
    <tspan x="110" dy="20">• 目标：低耦合、高可见、可中断的人在回路协作</tspan>
  </text>

  <!-- Preload box -->
  <rect x="590" y="296" width="116" height="148" class="card" fill="#f5f3ff"/>
  <text x="648" y="322" text-anchor="middle" class="boxTitle">安全桥接</text>
  <text x="648" y="346" text-anchor="middle" class="boxText">
    <tspan x="648" dy="0">• contextBridge</tspan>
    <tspan x="648" dy="18">• ipcRenderer.invoke</tspan>
    <tspan x="648" dy="18">• 最小 API 面</tspan>
    <tspan x="648" dy="18">• 隔离渲染器</tspan>
  </text>

  <rect x="590" y="466" width="116" height="160" class="card" fill="#ede9fe"/>
  <text x="648" y="492" text-anchor="middle" class="boxTitle">暴露能力</text>
  <text x="648" y="516" text-anchor="middle" class="boxText">
    <tspan x="648" dy="0">• team runtime</tspan>
    <tspan x="648" dy="18">• team worker</tspan>
    <tspan x="648" dy="18">• image / clipboard</tspan>
    <tspan x="648" dy="18">• 仅转发不决策</tspan>
  </text>

  <!-- Main boxes -->
  <rect x="794" y="296" width="318" height="144" class="card" fill="#fff1f2"/>
  <text x="816" y="322" class="boxTitle">入口与生命周期</text>
  <text x="816" y="345" class="boxText">
    <tspan x="816" dy="0">• app 启动、窗口、托盘、升级、代理、崩溃日志</tspan>
    <tspan x="816" dy="20">• 注册 IPC handlers，统一管理关闭 / 清理 / 资源回收</tspan>
    <tspan x="816" dy="20">• window-ipc 负责单窗 / 多窗事件广播</tspan>
    <tspan x="816" dy="20">• main/index.ts 是所有能力的装配点</tspan>
  </text>

  <rect x="1132" y="296" width="382" height="144" class="card" fill="#fee2e2"/>
  <text x="1154" y="322" class="boxTitle">核心 IPC 与业务域</text>
  <text x="1154" y="345" class="boxText">
    <tspan x="1154" dy="0">• db / settings / fs / shell / browser / ssh / git / wiki</tspan>
    <tspan x="1154" dy="20">• goals / plans / tasks / memory / extensions / oauth / screenshots</tspan>
    <tspan x="1154" dy="20">• agents / channels / team-runtime / team-worker / cron / mcp</tspan>
    <tspan x="1154" dy="20">• 处理器按域拆分，避免单体 IPC 文件膨胀</tspan>
  </text>

  <rect x="794" y="460" width="318" height="160" class="card" fill="#ffe4e6"/>
  <text x="816" y="486" class="boxTitle">运行时能力编排</text>
  <text x="816" y="509" class="boxText">
    <tspan x="816" dy="0">• Agent runtime / team runtime / cron background agent</tspan>
    <tspan x="816" dy="20">• 子智能体、团队、任务、计划、目标在主进程/渲染间协同</tspan>
    <tspan x="816" dy="20">• 事件流统一经 shared/agent-loop-types.ts 和 stream 协议</tspan>
    <tspan x="816" dy="20">• 支持中断、审批、重试、上下文压缩、可观测性</tspan>
  </text>

  <rect x="1132" y="460" width="382" height="160" class="card" fill="#fecaca"/>
  <text x="1154" y="486" class="boxTitle">持久化与外部服务</text>
  <text x="1154" y="509" class="boxText">
    <tspan x="1154" dy="0">• SQLite：messages / sessions / projects / tasks / plans / goals</tspan>
    <tspan x="1154" dy="20">• ~/.open-cowork：agents / skills / prompts / commands / plugins</tspan>
    <tspan x="1154" dy="20">• MCP 服务器、通讯插件、Shell / node-pty、SSH / ssh2</tspan>
    <tspan x="1154" dy="20">• WebDAV 同步、浏览器仿真、下载 / 剪贴板 / 截图</tspan>
  </text>

  <rect x="794" y="638" width="720" height="82" class="card" fill="#fff7ed"/>
  <text x="816" y="667" class="boxTitle">架构结论</text>
  <text x="816" y="692" class="boxText">OpenCowork 的关键分界是：Renderer 负责人机交互与 Agent 状态，Preload 只做桥接，Main 独占系统特权；能力通过 IPC、动态目录和共享协议解耦。</text>

  <!-- External systems lane -->
  <rect x="64" y="770" width="1472" height="184" class="card" fill="url(#extGrad)"/>
  <text x="88" y="806" class="section">外部系统 / 资源边界</text>
  <text x="88" y="830" class="small">主进程统一访问这些资源；渲染进程只能通过 preload 暴露的受控 API 触达。</text>

  <rect x="88" y="854" width="220" height="74" class="card" fill="#ecfccb"/>
  <text x="198" y="882" text-anchor="middle" class="boxTitle">SQLite</text>
  <text x="198" y="904" text-anchor="middle" class="small">本地持久化状态</text>

  <rect x="324" y="854" width="220" height="74" class="card" fill="#d9f99d"/>
  <text x="434" y="882" text-anchor="middle" class="boxTitle">文件系统</text>
  <text x="434" y="904" text-anchor="middle" class="small">代码 / 资源 / 数据目录</text>

  <rect x="560" y="854" width="220" height="74" class="card" fill="#bbf7d0"/>
  <text x="670" y="882" text-anchor="middle" class="boxTitle">Shell / SSH</text>
  <text x="670" y="904" text-anchor="middle" class="small">node-pty / ssh2</text>

  <rect x="796" y="854" width="220" height="74" class="card" fill="#a7f3d0"/>
  <text x="906" y="882" text-anchor="middle" class="boxTitle">MCP / Web</text>
  <text x="906" y="904" text-anchor="middle" class="small">MCP server / 浏览器 / 网络</text>

  <rect x="1032" y="854" width="220" height="74" class="card" fill="#86efac"/>
  <text x="1142" y="882" text-anchor="middle" class="boxTitle">通讯插件</text>
  <text x="1142" y="904" text-anchor="middle" class="small">飞书 / 钉钉 / Discord / QQ 等</text>

  <rect x="1268" y="854" width="220" height="74" class="card" fill="#4ade80"/>
  <text x="1378" y="882" text-anchor="middle" class="boxTitle">Cron / Team</text>
  <text x="1378" y="904" text-anchor="middle" class="small">后台智能体 / 团队运行时</text>

  <!-- Flows -->
  <path d="M532 350 C553 350, 553 350, 590 350" class="arrow"/>
  <text x="561" y="337" text-anchor="middle" class="label">IPC / invoke</text>

  <path d="M706 350 C738 350, 744 350, 794 350" class="arrow"/>
  <text x="750" y="337" text-anchor="middle" class="label">转发</text>

  <path d="M1112 420 C1112 442, 1112 442, 1112 460" class="arrowThin"/>
  <text x="1140" y="444" class="label">持久化 / 调用</text>

  <path d="M1480 520 C1520 520, 1520 820, 1480 820" class="arrowThin"/>
  <text x="1492" y="674" class="label">外部资源</text>

  <path d="M265 720 C265 756, 265 756, 265 854" class="arrowThin"/>
  <text x="285" y="792" class="label">状态更新</text>

  <path d="M1112 720 C1112 764, 1112 764, 1112 854" class="arrowThin"/>
  <text x="1130" y="792" class="label">业务落地</text>

  <!-- Notes bar -->
  <rect x="64" y="968" width="1472" height="34" rx="12" ry="12" fill="#0f172a" opacity="0.92"/>
  <text x="84" y="990" class="small" fill="#e2e8f0">设计要点：1) 能力分层 2) IPC 最小化 3) 共享协议稳定 4) 动态目录可扩展 5) 持久化与运行时分离</text>
</svg>
